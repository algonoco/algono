name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Assemble site artifact
        run: |
          mkdir -p dist
          cp index.html styles.css CNAME dist/
          cp -R assets dist/assets

      - name: Inject deploy-time placeholders
        env:
          GEMINI_API_KEY_SECRET: ${{ secrets.GEMINI_API_KEY }}
          STRIPE_LINK_SECRET: ${{ secrets.STRIPE_LINK }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('dist/index.html')
          content = path.read_text(encoding='utf-8')

          replacements = {
              "'GEMINI_API_KEY'": {
                  'value': os.environ['GEMINI_API_KEY_SECRET'],
                  'expected_occurrences': 2,
              },
              "'STRIPE_LINK_PLACEHOLDER'": {
                  'value': os.environ['STRIPE_LINK_SECRET'],
                  'expected_occurrences': 1,
              },
          }

          for placeholder, config in replacements.items():
              secret_value = config['value']
              if not secret_value:
                  raise SystemExit(f'Missing required secret for {placeholder}.')

              occurrences = content.count(placeholder)
              if occurrences != config['expected_occurrences']:
                  raise SystemExit(
                      f"Expected exactly {config['expected_occurrences']} occurrence(s) of {placeholder} in dist/index.html, found {occurrences}."
                  )

              content = content.replace(placeholder, json.dumps(secret_value))

              if placeholder in content:
                  raise SystemExit(f'{placeholder} placeholder still present in dist/index.html after injection.')

          path.write_text(content, encoding='utf-8')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
