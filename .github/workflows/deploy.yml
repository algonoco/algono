name: deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Assemble site artifact
        run: |
          mkdir -p dist
          cp index.html styles.css CNAME dist/
          cp -R assets dist/assets

      - name: Inject Gemini API key
        env:
          GEMINI_API_KEY_SECRET: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python - <<'PY'
          import os
          import json
          from pathlib import Path

          path = Path('dist/index.html')
          content = path.read_text(encoding='utf-8')
          placeholder = "'GEMINI_API_KEY'"
          replacement = json.dumps(os.environ['GEMINI_API_KEY_SECRET'])
          occurrences = content.count(placeholder)

          if occurrences != 1:
              raise SystemExit(f'Expected exactly 1 occurrence of {placeholder} in dist/index.html, found {occurrences}.')

          content = content.replace(placeholder, replacement, 1)

          if 'GEMINI_API_KEY' in content:
              raise SystemExit('GEMINI_API_KEY placeholder still present in dist/index.html after injection.')

          path.write_text(content, encoding='utf-8')
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
