name: chat smoke

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest
    environment: github-pages

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          mkdir -p /tmp/algono-chat-smoke
          cd /tmp/algono-chat-smoke
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.1 >/dev/null
          npx playwright install --with-deps chromium

      - name: Build smoke fixture
        env:
          GEMINI_API_KEY_SECRET: ${{ secrets.GEMINI_API_KEY }}
        run: |
          mkdir -p dist-smoke
          cp index.html styles.css dist-smoke/
          cp -R assets dist-smoke/assets
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          path = Path('dist-smoke/index.html')
          content = path.read_text(encoding='utf-8')
          placeholder = "'GEMINI_API_KEY'"
          replacement = json.dumps(os.environ['GEMINI_API_KEY_SECRET'])
          occurrences = content.count(placeholder)

          if occurrences != 1:
              raise SystemExit(f'Expected exactly 1 occurrence of {placeholder} in dist-smoke/index.html, found {occurrences}.')

          content = content.replace(placeholder, replacement, 1)

          if placeholder in content:
              raise SystemExit(f'{placeholder} placeholder still present in dist-smoke/index.html after injection.')

          path.write_text(content, encoding='utf-8')
          PY

      - name: Run Playwright smoke test
        env:
          NODE_PATH: /tmp/algono-chat-smoke/node_modules
        run: |
          python -m http.server 4173 --directory dist-smoke >/tmp/algono-chat-smoke-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          node <<'NODE'
          const { chromium } = require('playwright');

          const failureReplies = new Set([
            'chat offline. key missing.',
            'offline. try again.',
            'gemini timed out. try again.',
            'google api blocked. try another network.',
            'request rejected. try again.',
            'gemini key rejected.',
            'rate limited. try again.',
            'gemini is down. try again.',
            'request failed. try again.'
          ]);

          function getLastAgentReply() {
            return Array
              .from(document.querySelectorAll('.agent-line .line-text'))
              .map(node => node.textContent.trim())
              .filter(Boolean)
              .at(-1);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });
            const page = await browser.newPage();

            await page.goto('http://127.0.0.1:4173', { waitUntil: 'domcontentloaded' });
            await page.getByText('what do you want to know?').waitFor({ timeout: 20000 });
            await page.waitForTimeout(1500);

            const input = page.getByLabel('Type your message');
            await input.fill('what does algono do?');
            await input.press('Enter');

            await page.waitForFunction(failures => {
              const lastReply = Array
                .from(document.querySelectorAll('.agent-line .line-text'))
                .map(node => node.textContent.trim())
                .filter(Boolean)
                .at(-1);

              return lastReply && lastReply !== '_' && !failures.includes(lastReply);
            }, Array.from(failureReplies), { timeout: 45000 });

            const reply = await page.evaluate(getLastAgentReply);

            if (!reply || failureReplies.has(reply)) {
              throw new Error(`Unexpected reply: ${reply || '<empty>'}`);
            }

            console.log(`Gemini reply received (${reply.length} chars).`);
            await browser.close();
          })().catch(error => {
            console.error(error);
            process.exitCode = 1;
          });
          NODE
