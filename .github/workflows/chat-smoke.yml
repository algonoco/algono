name: chat smoke

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: read
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          mkdir -p /tmp/algono-chat-smoke
          cd /tmp/algono-chat-smoke
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.1 >/dev/null
          npx playwright install --with-deps chromium

      - name: Build smoke fixture
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist-smoke
          cp index.html styles.css dist-smoke/
          cp -R assets dist-smoke/assets
          python - <<'PY'
          import json
          import os
          import re
          import subprocess
          import tarfile
          import urllib.request
          import zipfile
          from pathlib import Path, PurePosixPath

          repo = os.environ['GITHUB_REPOSITORY']
          token = os.environ['GITHUB_TOKEN']
          api_headers = {
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28'
          }

          def read_json(url):
              request = urllib.request.Request(url, headers=api_headers)
              with urllib.request.urlopen(request) as response:
                  return json.load(response)

          runs = read_json(f'https://api.github.com/repos/{repo}/actions/workflows/deploy.yml/runs?branch=main&status=success&per_page=1')
          workflow_runs = runs.get('workflow_runs', [])
          if not workflow_runs:
              raise SystemExit(
                  'Could not build smoke fixture: no successful deploy.yml runs were found on the main branch.'
              )

          run = workflow_runs[0]
          artifacts = read_json(f'https://api.github.com/repos/{repo}/actions/runs/{run["id"]}/artifacts?per_page=100')
          artifact = next(
              (
                  item
                  for item in artifacts.get('artifacts', [])
                  if item['name'] == 'github-pages' and not item['expired']
              ),
              None,
          )
          if artifact is None:
              raise SystemExit(
                  'Could not build smoke fixture: no non-expired github-pages artifact was found for the latest successful deploy.yml run.'
              )

          artifact_dir = Path('/tmp/algono-chat-smoke-artifact')
          artifact_dir.mkdir(parents=True, exist_ok=True)
          zip_path = artifact_dir / 'artifact.zip'
          subprocess.run([
              'curl',
              '-fsSL',
              '-H', f'Authorization: Bearer {token}',
              '-H', 'Accept: application/vnd.github+json',
              artifact['archive_download_url'],
              '-o', str(zip_path),
          ], check=True)

          with zipfile.ZipFile(zip_path) as archive:
              with archive.open('artifact.tar') as artifact_tar:
                  with tarfile.open(fileobj=artifact_tar, mode='r:*') as tar_archive:
                      index_entry = next(
                          (
                              member
                              for member in tar_archive.getmembers()
                              if member.isfile() and PurePosixPath(member.name).name == 'index.html'
                          ),
                          None,
                      )

                      if index_entry is None:
                          raise SystemExit('Could not find index.html in the latest deployed artifact.')

                      index_member = tar_archive.extractfile(index_entry)

                      if index_member is None:
                          raise SystemExit('Could not read index.html from the latest deployed artifact.')

                      artifact_index = index_member.read().decode('utf-8')
          match = re.search(r"const apiKey = (.+?);", artifact_index)

          if not match:
              raise SystemExit('Could not find the injected Gemini key in the latest deployed artifact.')

          path = Path('dist-smoke/index.html')
          content = path.read_text(encoding='utf-8')
          placeholder = "'GEMINI_API_KEY'"
          replacement = match.group(1)
          occurrences = content.count(placeholder)

          if occurrences != 1:
              raise SystemExit(f'Expected exactly 1 occurrence of {placeholder} in dist-smoke/index.html, found {occurrences}.')

          content = content.replace(placeholder, replacement, 1)

          if placeholder in content:
              raise SystemExit(f'{placeholder} placeholder still present in dist-smoke/index.html after injection.')

          path.write_text(content, encoding='utf-8')
          PY

      - name: Run Playwright smoke test
        env:
          NODE_PATH: /tmp/algono-chat-smoke/node_modules
        run: |
          python -m http.server 4173 --directory dist-smoke >/tmp/algono-chat-smoke-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          node <<'NODE'
          const { chromium } = require('playwright');

          const failureReplies = new Set([
            'chat offline. key missing.',
            'offline. try again.',
            'gemini timed out. try again.',
            'google api blocked. try another network.',
            'request rejected. try again.',
            'gemini key rejected.',
            'rate limited. try again.',
            'gemini is down. try again.',
            'request failed. try again.'
          ]);

          function getLastAgentReply() {
            return Array
              .from(document.querySelectorAll('.agent-line .line-text'))
              .map(node => node.textContent.trim())
              .filter(Boolean)
              .at(-1);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            try {
               const page = await browser.newPage();

               await page.goto('http://127.0.0.1:4173', { waitUntil: 'domcontentloaded' });
               await page.getByText('what do you want to know?').waitFor({ timeout: 20000 });

               const input = page.getByLabel('Type your message');
               await input.waitFor({ state: 'attached', timeout: 5000 });
               const inputHandle = await input.elementHandle();
               await page.waitForFunction(field => field && !field.disabled, inputHandle, { timeout: 5000 });

               await input.fill('what does algono do?');
               await input.press('Enter');

               await page.waitForFunction((knownFailures) => {
                 const lastReply = Array
                   .from(document.querySelectorAll('.agent-line .line-text'))
                   .map(node => node.textContent.trim())
                   .filter(Boolean)
                   .at(-1);

                 if (!lastReply || lastReply === '_') {
                   return false;
                 }

                 if (knownFailures.includes(lastReply)) {
                   throw new Error(`Unexpected reply: ${lastReply}`);
                 }

                 return true;
               }, Array.from(failureReplies), { timeout: 45000 });

               const reply = await page.evaluate(getLastAgentReply);

               if (!reply || failureReplies.has(reply)) {
                 throw new Error(`Unexpected reply: ${reply || '<empty>'}`);
               }

               console.log(`Gemini reply received (${reply.length} chars).`);
             } finally {
               await browser.close();
             }
           })().catch(error => {
             console.error(error);
             process.exitCode = 1;
           });
          NODE
