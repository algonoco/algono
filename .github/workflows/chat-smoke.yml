name: chat smoke

on:
  push:
    branches-ignore:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          mkdir -p /tmp/algono-chat-smoke
          cd /tmp/algono-chat-smoke
          npm init -y >/dev/null 2>&1
          npm install playwright@1.55.1 >/dev/null
          npx playwright install --with-deps chromium

      - name: Build smoke fixture
        run: |
          mkdir -p dist-smoke
          cp index.html styles.css dist-smoke/
          cp -R assets dist-smoke/assets

      - name: Run Playwright smoke test
        env:
          NODE_PATH: /tmp/algono-chat-smoke/node_modules
        run: |
          python -m http.server 4173 --directory dist-smoke >/tmp/algono-chat-smoke-server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill $SERVER_PID' EXIT
          node <<'NODE'
          const { chromium } = require('playwright');

          const failureReplies = new Set([
            'chat offline. key missing.',
            'offline. try again.',
            'gemini timed out. try again.',
            'google api blocked. try another network.',
            'request rejected. try again.',
            'gemini key rejected.',
            'rate limited. try again.',
            'gemini is down. try again.',
            'request failed. try again.'
          ]);

          function getLastAgentReply() {
            return Array
              .from(document.querySelectorAll('.agent-line .line-text'))
              .map(node => node.textContent.trim())
              .filter(Boolean)
              .at(-1);
          }

          (async () => {
            const browser = await chromium.launch({ headless: true });

            try {
               const page = await browser.newPage();

               await page.goto('http://127.0.0.1:4173', { waitUntil: 'domcontentloaded' });
               await page.getByText('what do you want to know?').waitFor({ timeout: 20000 });

               const input = page.getByLabel('Type your message');
               await input.waitFor({ state: 'attached', timeout: 5000 });
               const inputHandle = await input.elementHandle();
               await page.waitForFunction(field => field && !field.disabled, inputHandle, { timeout: 5000 });

               await input.fill('what does algono do?');
               await input.press('Enter');

               await page.waitForFunction((knownFailures) => {
                 const lastReply = Array
                   .from(document.querySelectorAll('.agent-line .line-text'))
                   .map(node => node.textContent.trim())
                   .filter(Boolean)
                   .at(-1);

                 if (!lastReply || lastReply === '_') {
                   return false;
                 }

                 if (knownFailures.includes(lastReply)) {
                   throw new Error(`Unexpected reply: ${lastReply}`);
                 }

                 return true;
               }, Array.from(failureReplies), { timeout: 45000 });

               const reply = await page.evaluate(getLastAgentReply);

               if (!reply || failureReplies.has(reply)) {
                 throw new Error(`Unexpected reply: ${reply || '<empty>'}`);
               }

               console.log(`Gemini reply received (${reply.length} chars).`);
             } finally {
               await browser.close();
             }
           })().catch(error => {
             console.error(error);
             process.exitCode = 1;
           });
          NODE
