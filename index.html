<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Algono — Active Directory / Entra ID over-provisioning remediation toolkit." />
  <title>&gt;_ algono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="logo">&gt;_ algono</div>
    <div id="chat-log" role="log" aria-live="polite" aria-label="Chat messages"></div>
    <div id="input-area">
      <span id="input-prompt">&gt;</span>
      <input
        type="text"
        id="user-input"
        disabled
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Type your message"
        placeholder="type here..."
      />
      <button id="send-btn" aria-label="Send message" disabled>send</button>
    </div>
  </div>

  <script>
    /* ── configuration ────────────────────────────────────── */

    const GEMINI_API_KEY = "GEMINI_API_KEY";
    const STRIPE_LINK    = "https://buy.stripe.com/00wfZjcw38no4bdbNp6wE00";
    const SCANNER_LINK   = "SCAN_SCRIPT_LINK_PLACEHOLDER";

    const GEMINI_URL =
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + GEMINI_API_KEY;

    const SYSTEM_PROMPT = [
      "You are the Algono sales agent — terse, direct, terminal-aesthetic voice.",
      "Product: Algono is an Active Directory / Entra ID over-provisioning remediation toolkit.",
      "Tier 1 (free): A scanner script. Runs on-prem, zero telemetry. Produces a PDF exposure report showing every over-provisioned account, group, and delegated right. Scanner link: " + SCANNER_LINK,
      "Tier 2 ($400 one-time): The full remediation + rollback kit. Includes the scanner plus automated least-privilege enforcement and a full rollback safety net. One-time purchase, no subscription. Stripe checkout link: " + STRIPE_LINK,
      "Tone: You are not a funnel. You are not collecting emails. You are not nurturing leads. If someone asks, you give them what they need — the scanner link, the Stripe link, or an honest answer. We don't even want their email address.",
      "Keep responses short. A few sentences max. Use lowercase. No emoji. No markdown headers. Match the terminal vibe.",
      "If someone asks what Algono does, explain it plainly: it scans AD environments, maps privilege exposure, scores blast radii, and compiles a report. The scanner is free. The full kit is $400.",
      "If someone wants the scanner, give them the scanner link.",
      "If someone wants the full kit, drop the Stripe link.",
      "Do not make up features. Do not promise things the product does not do.",
    ].join("\n");

    const TYPEWRITER_DELAY = 18; // ms per character
    const FETCH_TIMEOUT_MS = 30000;

    /* ── session conversation memory (Gemini API format) ─── */

    const conversationContents = [];

    /* ── DOM refs ─────────────────────────────────────────── */

    const chatLog   = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const sendBtn   = document.getElementById('send-btn');

    /* ── helpers ──────────────────────────────────────────── */

    function scrollBottom() {
      window.scrollTo(0, document.documentElement.scrollHeight);
    }

    function appendLine(prefix, prefixClass, textClass) {
      const line = document.createElement('div');
      line.className = 'chat-line';

      const pre = document.createElement('span');
      pre.className = 'prefix ' + prefixClass;
      pre.textContent = prefix;

      const text = document.createElement('span');
      text.className = 'text ' + textClass;

      line.appendChild(pre);
      line.appendChild(text);
      chatLog.appendChild(line);
      scrollBottom();
      return { line, text };
    }

    function addCursor(parent) {
      const cur = document.createElement('span');
      cur.className = 'cursor';
      parent.appendChild(cur);
      return cur;
    }

    function removeCursors() {
      chatLog.querySelectorAll('.cursor').forEach(c => c.remove());
    }

    function pause(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function typewrite(el, str, delay) {
      return new Promise(resolve => {
        let i = 0;
        (function tick() {
          if (i < str.length) {
            el.textContent += str[i++];
            scrollBottom();
            setTimeout(tick, delay);
          } else {
            resolve();
          }
        })();
      });
    }

    /* ── opening sequence ─────────────────────────────────── */

    async function openingSequence() {
      const openingLines = [
        { text: 'your directory is leaking.', pauseAfter: 400 },
        { text: 'we see it everywhere.', pauseAfter: 150 },
        { text: 'interns with Domain Admin.', pauseAfter: 120 },
        { text: 'level 1 helpdesk with god-mode.', pauseAfter: 130 },
        { text: 'that contractor from 2019 who never got offboarded.', pauseAfter: 700 },
        { text: "there's a script for that.", pauseAfter: 500 },
        { text: 'what do you want to know?', pauseAfter: 0 },
      ];

      let finalLine;

      for (const { text, pauseAfter } of openingLines) {
        const entry = appendLine('$', 'agent-prefix', 'agent-text');
        await typewrite(entry.text, text, TYPEWRITER_DELAY);
        finalLine = entry.line;
        await pause(pauseAfter);
      }

      const handoffCursor = addCursor(finalLine);
      await pause(1200);
      handoffCursor.remove();
      setWorking(false);
      userInput.focus();
    }

    /* ── send / receive ───────────────────────────────────── */

    function setWorking(on) {
      userInput.disabled = on;
      sendBtn.disabled   = on;
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg) return;

      userInput.value = '';
      setWorking(true);
      removeCursors();

      appendLine('>', 'user-prefix', 'user-text').text.textContent = msg;

      conversationContents.push({
        role: 'user',
        parts: [{ text: msg }],
      });

      const { line: agentLine, text: agentText } = appendLine('$', 'agent-prefix', 'agent-text');
      const thinkCursor = addCursor(agentLine);

      const controller = new AbortController();
      const timeout = setTimeout(() => controller.abort(), FETCH_TIMEOUT_MS);

      try {
        const res = await fetch(GEMINI_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          signal: controller.signal,
          body: JSON.stringify({
            system_instruction: {
              parts: [{ text: SYSTEM_PROMPT }],
            },
            contents: conversationContents,
          }),
        });

        clearTimeout(timeout);

        if (!res.ok) {
          const body = await res.text();
          throw new Error('HTTP ' + res.status + ': ' + body.slice(0, 120));
        }

        thinkCursor.remove();

        const data = await res.json();
        const reply =
          data.candidates?.[0]?.content?.parts?.[0]?.text ??
          '(no response)';

        conversationContents.push({
          role: 'model',
          parts: [{ text: reply }],
        });

        await typewrite(agentText, reply, TYPEWRITER_DELAY);

      } catch (err) {
        clearTimeout(timeout);
        thinkCursor.remove();
        const errMsg = err.name === 'AbortError'
          ? 'error: request timed out.'
          : 'error: ' + err.message;
        agentText.textContent = errMsg;
      }

      addCursor(agentLine);
      setWorking(false);
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => {
      if (e.key !== 'Enter' || e.isComposing) return;
      e.preventDefault();
      sendMessage();
    });

    setWorking(true);
    openingSequence();
  </script>
</body>
</html>
