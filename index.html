<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Algono — Active Directory / Entra ID over-provisioning remediation toolkit." />
  <title>&gt;_ algono</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app">
    <div id="logo">&gt;_ algono</div>
    <div id="chat-log" role="log" aria-live="polite" aria-label="Chat messages"></div>
    <div id="input-area">
      <span id="input-prompt">&gt;</span>
      <input
        type="text"
        id="user-input"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        aria-label="Type your message"
        placeholder="type here..."
      />
      <button id="send-btn" aria-label="Send message">send</button>
    </div>
  </div>

  <script>
    const AGENT_ENDPOINT = "https://YOUR_ENDPOINT_HERE";

    const TYPEWRITER_DELAY = 18; // ms per character

    const chatLog  = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const sendBtn  = document.getElementById('send-btn');

    /* ── helpers ──────────────────────────────────────────── */

    function scrollBottom() {
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function appendLine(prefix, prefixClass, textClass) {
      const line   = document.createElement('div');
      line.className = 'chat-line';

      const pre    = document.createElement('span');
      pre.className = 'prefix ' + prefixClass;
      pre.textContent = prefix;

      const text   = document.createElement('span');
      text.className = 'text ' + textClass;

      line.appendChild(pre);
      line.appendChild(text);
      chatLog.appendChild(line);
      scrollBottom();
      return { line, text };
    }

    function addCursor(parent) {
      const cur = document.createElement('span');
      cur.className = 'cursor';
      parent.appendChild(cur);
      return cur;
    }

    function removeCursors() {
      chatLog.querySelectorAll('.cursor').forEach(c => c.remove());
    }

    function typewrite(el, str, delay) {
      return new Promise(resolve => {
        let i = 0;
        (function tick() {
          if (i < str.length) {
            el.textContent += str[i++];
            scrollBottom();
            setTimeout(tick, delay);
          } else {
            resolve();
          }
        })();
      });
    }

    /* ── opening sequence ─────────────────────────────────── */

    async function openingSequence() {
      await new Promise(r => setTimeout(r, 600));

      const { text: t1 } = appendLine('$', 'agent-prefix', 'agent-text');
      await typewrite(t1, 'your AD is probably on fire.', TYPEWRITER_DELAY);

      const { line: l2, text: t2 } = appendLine('$', 'agent-prefix', 'agent-text');
      await typewrite(t2, 'find out.', TYPEWRITER_DELAY);
      addCursor(l2);
    }

    /* ── send / receive ───────────────────────────────────── */

    function setWorking(on) {
      userInput.disabled = on;
      sendBtn.disabled   = on;
    }

    async function sendMessage() {
      const msg = userInput.value.trim();
      if (!msg) return;

      userInput.value = '';
      setWorking(true);
      removeCursors();

      appendLine('&gt;', 'user-prefix', 'user-text').text.textContent = msg;

      const { line: agentLine, text: agentText } = appendLine('$', 'agent-prefix', 'agent-text');
      const thinkCursor = addCursor(agentLine);

      try {
        const res = await fetch(AGENT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg }),
        });

        if (!res.ok) throw new Error('HTTP ' + res.status);

        thinkCursor.remove();

        const ct = res.headers.get('Content-Type') || '';

        if (ct.includes('text/event-stream')) {
          // Server-Sent Events streaming
          const reader  = res.body.getReader();
          const decoder = new TextDecoder();
          let buf = '';

          while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            buf += decoder.decode(value, { stream: true });
            const parts = buf.split('\n');
            buf = parts.pop();
            for (const part of parts) {
              if (!part.startsWith('data: ')) continue;
              const raw = part.slice(6).trim();
              if (raw === '[DONE]') continue;
              try {
                const parsed = JSON.parse(raw);
                const chunk =
                  parsed.content ??
                  parsed.delta?.content ??
                  parsed.choices?.[0]?.delta?.content ??
                  '';
                for (const ch of chunk) {
                  agentText.textContent += ch;
                  scrollBottom();
                  await new Promise(r => setTimeout(r, TYPEWRITER_DELAY));
                }
              } catch (_) { /* skip malformed frames */ }
            }
          }
        } else {
          // Full JSON response — typewriter-animate client-side
          const data = await res.json();
          const reply =
            data.reply   ??
            data.message ??
            data.content ??
            data.response ??
            JSON.stringify(data);
          await typewrite(agentText, String(reply), TYPEWRITER_DELAY);
        }

      } catch (err) {
        thinkCursor.remove();
        agentText.textContent = 'error: ' + err.message;
      }

      addCursor(agentLine);
      setWorking(false);
      userInput.focus();
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    openingSequence();
  </script>
</body>
</html>
