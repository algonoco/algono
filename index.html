<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Algono — Active Directory / Entra ID over-provisioning remediation toolkit." />
  <meta name="theme-color" content="#000000" />
  <title>algono</title>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="manifest" href="assets/site.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="terminal-window">
    <header class="title-bar">
      <img src="assets/algono.png" alt="Algono" class="title-logo" width="120" />
    </header>

    <main class="terminal-body">
      <div id="chat-log" class="chat-log" role="log" aria-live="polite" aria-label="Chat messages"></div>

      <div class="input-row" aria-label="Message input">
        <div class="input-shell">
          <span class="input-prompt">&gt;</span>
          <input
            type="text"
            id="user-input"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Type your message"
            disabled
          />
        </div>
        <button id="send-btn" type="button" aria-label="Send message" disabled>send</button>
      </div>
    </main>
  </div>

  <script>
    const apiKey = 'GEMINI_API_KEY';
    const STRIPE_LINK = 'STRIPE_LINK_PLACEHOLDER';
    const GEMINI_URL = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + apiKey;
    const REQUEST_TIMEOUT_MS = 30000;

    const SYSTEM_PROMPT = [
      'You are the Algono agent. Algono is an Active Directory and Entra ID over-provisioning remediation toolkit built by a practitioner. You are terse, technically credible, and do not waste words. You do not ask for email addresses. You do not push users into funnels. You answer what is asked.',
      'The free scanner script enumerates over-provisioned accounts across AD and Entra, flags accounts with privileges that do not match their OU or role, and outputs structured JSON. It is free. When a user asks for it, tell them the scanner will be available shortly and to check back — do not fabricate a link.',
      'The full remediation kit is $400 one-time. It includes the scanner, a fixer that strips excessive group memberships with dry-run mode, and a rollback module that snapshots permissions before any change and restores on command. When a user asks to buy or asks about the $400 kit, give them this link: ' + STRIPE_LINK,
      'Do not mention email. Do not mention GitHub. Do not offer to schedule calls. Do not use marketing language. Answer technically. Be brief.'
    ].join('\n');

    const OPENING_LINES = [
      { text: 'your directory is leaking.', delayAfter: 800 },
      { text: 'we see it everywhere.', delayAfter: 150 },
      { text: 'interns with Domain Admin.', delayAfter: 120 },
      { text: 'level 1 helpdesk with god-mode.', delayAfter: 130 },
      { text: 'that contractor from 2019 who never got offboarded.', delayAfter: 700 },
      { text: "there\'s a script for that.", delayAfter: 500 },
      { text: 'what do you want to know?', delayAfter: 0 }
    ];

    const TYPE_DELAY = 18;
    const HANDOFF_DELAY = 1200;
    const conversationContents = [];

    const chatLog = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function scrollLog() {
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function appendLine(prefix, kind) {
      const line = document.createElement('div');
      line.className = 'chat-line ' + kind;

      const marker = document.createElement('span');
      marker.className = 'line-prefix';
      marker.textContent = prefix;

      const text = document.createElement('span');
      text.className = 'line-text';

      line.append(marker, text);
      chatLog.appendChild(line);
      scrollLog();
      return { line, text };
    }

    function addCursor(target) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      target.appendChild(cursor);
      return cursor;
    }

    function setInputState(disabled) {
      userInput.disabled = disabled;
      sendBtn.disabled = disabled;
    }

    function isApiKeyConfigured() {
      return Boolean(apiKey) && apiKey.startsWith('AIza') && apiKey.length === 39;
    }

    async function readGeminiError(response) {
      try {
        const data = await response.json();
        return data?.error?.message?.trim() || '';
      } catch {
        return '';
      }
    }

    function getHttpErrorText(status) {
      if (status === 400) {
        return 'request rejected. try again.';
      }

      if (status === 401 || status === 403) {
        return 'gemini key rejected.';
      }

      if (status === 429) {
        return 'rate limited. try again.';
      }

      if (status >= 500) {
        return 'gemini is down. try again.';
      }

      return 'request failed. try again.';
    }

    function getRequestErrorText(error) {
      if (error?.code === 'missing_api_key') {
        return 'chat offline. key missing.';
      }

      if (!navigator.onLine) {
        return 'offline. try again.';
      }

      if (error?.name === 'AbortError') {
        return 'gemini timed out. try again.';
      }

      return 'google api blocked. try another network.';
    }

    async function requestGeminiReply() {
      if (!isApiKeyConfigured()) {
        const error = new Error('Gemini API key is missing.');
        error.code = 'missing_api_key';
        throw error;
      }

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

      try {
        const response = await fetch(GEMINI_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          signal: controller.signal,
          body: JSON.stringify({
            system_instruction: {
              parts: [{ text: SYSTEM_PROMPT }]
            },
            contents: conversationContents
          })
        });

        if (!response.ok) {
          const detail = await readGeminiError(response);
          const error = new Error(detail || 'Gemini request failed.');
          error.status = response.status;
          throw error;
        }

        const data = await response.json();
        const reply = data.candidates?.[0]?.content?.parts
          ?.map(part => part.text || '')
          .join('')
          .trim();

        if (!reply) {
          throw new Error('Gemini returned an empty response.');
        }

        return reply;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function typewrite(target, text) {
      for (const char of text) {
        target.textContent += char;
        scrollLog();
        await sleep(TYPE_DELAY);
      }
    }

    async function openingSequence() {
      let finalTextNode = null;

      for (const line of OPENING_LINES) {
        const entry = appendLine('$', 'agent-line');
        await typewrite(entry.text, line.text);
        finalTextNode = entry.text;

        if (line.delayAfter > 0) {
          await sleep(line.delayAfter);
        }
      }

      const handoffCursor = addCursor(finalTextNode);
      await sleep(HANDOFF_DELAY);
      handoffCursor.remove();
      setInputState(false);
      userInput.focus();
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message || userInput.disabled) {
        return;
      }

      userInput.value = '';
      setInputState(true);

      const userLine = appendLine('>', 'user-line');
      userLine.text.textContent = message;

      const userEntry = {
        role: 'user',
        parts: [{ text: message }]
      };
      conversationContents.push(userEntry);

      const agentLine = appendLine('$', 'agent-line');
      agentLine.text.textContent = '_';
      agentLine.text.classList.add('pending-text');

      try {
        const reply = await requestGeminiReply();

        conversationContents.push({
          role: 'model',
          parts: [{ text: reply }]
        });

        agentLine.text.classList.remove('pending-text');
        agentLine.text.textContent = '';
        await typewrite(agentLine.text, reply);
      } catch (error) {
        if (conversationContents[conversationContents.length - 1] === userEntry) {
          conversationContents.pop();
        }

        console.error('gemini request failed', error);
        agentLine.text.classList.remove('pending-text');
        agentLine.text.textContent = error?.status
          ? getHttpErrorText(error.status)
          : getRequestErrorText(error);
      } finally {
        setInputState(false);
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', event => {
      if (event.key !== 'Enter' || event.isComposing) {
        return;
      }

      event.preventDefault();
      sendMessage();
    });

    openingSequence();
  </script>
</body>
</html>
