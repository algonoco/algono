<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Algono — Active Directory / Entra ID over-provisioning remediation toolkit." />
  <meta name="theme-color" content="#000000" />
  <title>algono</title>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon-16x16.png" />
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="shortcut icon" href="assets/favicon.ico" />
  <link rel="manifest" href="assets/site.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="terminal-window">
    <header class="title-bar">
      <img src="assets/algono_square.png" alt="Algono" class="title-logo" width="120" />
      <a href="classic.html" class="classic-link">don't like cli? classic →</a>
    </header>

    <main class="terminal-body">
      <div id="chat-log" class="chat-log" role="log" aria-live="polite" aria-label="Chat messages"></div>

      <div class="input-row" aria-label="Message input">
        <div class="input-shell">
          <span class="input-prompt">&gt;</span>
          <input
            type="text"
            id="user-input"
            autocomplete="off"
            autocorrect="off"
            autocapitalize="off"
            spellcheck="false"
            aria-label="Type your message"
            disabled
          />
        </div>
        <button id="send-btn" type="button" aria-label="Send message" disabled>send</button>
      </div>
    </main>
  </div>
  <script>
    
    const GEMINI_URL = 'https://algono-gemini-proxy.hofwar.workers.dev';
    const REQUEST_TIMEOUT_MS = 30000;

    const OPENING_LINES = [
      { text: 'your directory is leaking.', delayAfter: 800 },
      { text: 'we see it everywhere.', delayAfter: 150 },
      { text: 'interns with Domain Admin.', delayAfter: 120 },
      { text: 'level 1 helpdesk with god-mode.', delayAfter: 130 },
      { text: 'that contractor from 2019 who never got offboarded.', delayAfter: 700 },
      { text: "there\'s a script for that.", delayAfter: 500 },
      { text: 'what do you want to know?', delayAfter: 0 }
    ];

    const TYPE_DELAY = 18;
    const HANDOFF_DELAY = 1200;
    const conversationContents = [];

    const chatLog = document.getElementById('chat-log');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');

    function scrollLog() {
      chatLog.scrollTop = chatLog.scrollHeight;
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function appendLine(prefix, kind) {
      const line = document.createElement('div');
      line.className = 'chat-line ' + kind;

      const marker = document.createElement('span');
      marker.className = 'line-prefix';
      marker.textContent = prefix;

      const text = document.createElement('span');
      text.className = 'line-text';

      line.append(marker, text);
      chatLog.appendChild(line);
      scrollLog();
      return { line, text };
    }

    function addCursor(target) {
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      target.appendChild(cursor);
      return cursor;
    }

    function setInputState(disabled) {
      userInput.disabled = disabled;
      sendBtn.disabled = disabled;
    }

    async function readGeminiError(response) {
      try {
        const data = await response.json();
        return data?.error?.message?.trim() || '';
      } catch {
        return '';
      }
    }

    function getHttpErrorText(status) {
      if (status === 400) {
        return 'request rejected. try again.';
      }

      if (status === 401 || status === 403) {
        return 'gemini key rejected.';
      }

      if (status === 429) {
        return 'rate limited. try again.';
      }

      if (status >= 500) {
        return 'gemini is down. try again.';
      }

      return 'request failed. try again.';
    }

    function getRequestErrorText(error) {
      if (error?.code === 'missing_api_key') {
        return 'chat offline. key missing.';
      }

      if (!navigator.onLine) {
        return 'offline. try again.';
      }

      if (error?.name === 'AbortError') {
        return 'gemini timed out. try again.';
      }

      return 'google api blocked. try another network.';
    }

    async function requestGeminiReply() {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

      try {
        const response = await fetch(GEMINI_URL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          signal: controller.signal,
          body: JSON.stringify({
            contents: conversationContents
          })
        });

        if (!response.ok) {
          const detail = await readGeminiError(response);
          const error = new Error(detail || 'Gemini request failed.');
          error.status = response.status;
          throw error;
        }

        const data = await response.json();
        const reply = data.candidates?.[0]?.content?.parts
          ?.map(part => part.text || '')
          .join('')
          .trim();

        if (!reply) {
          throw new Error('Gemini returned an empty response.');
        }

        return reply;
      } finally {
        clearTimeout(timeoutId);
      }
    }

    function linkify(text) {
      return text.replace(
        /(https?:\/\/[^\s<>"']+)/g,
        '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
      );
    }

    async function typewrite(target, text) {
      for (const char of text) {
        target.textContent += char;
        scrollLog();
        await sleep(TYPE_DELAY);
      }
    }

    async function openingSequence() {
      let finalTextNode = null;

      for (const line of OPENING_LINES) {
        const entry = appendLine('$', 'agent-line');
        await typewrite(entry.text, line.text);
        finalTextNode = entry.text;

        if (line.delayAfter > 0) {
          await sleep(line.delayAfter);
        }
      }

      const handoffCursor = addCursor(finalTextNode);
      await sleep(HANDOFF_DELAY);
      handoffCursor.remove();

      setInputState(false);
      userInput.focus();

      showSuggestions();
    }

    function showSuggestions() {
      const suggestions = [
        { label: '$ what does it actually find?',  value: 'What exactly does the scan find?' },
        { label: '$ how fast does this run?',      value: 'How long does a scan take to run?' },
        { label: '$ i\'m sold. take my money.',    value: 'I want to buy the toolkit.' },
      ];

      const wrap = document.createElement('div');
      wrap.id = 'suggestions';
      wrap.style.cssText = `
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin: 16px 0 8px 0;
      `;

      suggestions.forEach(function(s) {
        const btn = document.createElement('button');
        btn.textContent = s.label;
        btn.style.cssText = `
          background: none;
          border: 1px solid #252521;
          color: #6b6a66;
          font-family: inherit;
          font-size: 0.8rem;
          text-align: left;
          padding: 8px 12px;
          cursor: pointer;
          border-radius: 2px;
          transition: color 180ms, border-color 180ms;
        `;
        btn.addEventListener('mouseenter', function() {
          btn.style.color = '#3dcc8e';
          btn.style.borderColor = '#3dcc8e';
        });
        btn.addEventListener('mouseleave', function() {
          btn.style.color = '#6b6a66';
          btn.style.borderColor = '#252521';
        });
        btn.addEventListener('click', function() {
          wrap.remove();
          const input = document.getElementById('user-input');
          input.value = s.value;
          document.getElementById('send-btn').click();
        });
        wrap.appendChild(btn);
      });

      const inputRow = document.querySelector('.input-row');
      inputRow.parentElement.insertBefore(wrap, inputRow);
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message || userInput.disabled) {
        return;
      }

      const suggestions = document.getElementById('suggestions');
      if (suggestions) {
        suggestions.remove();
      }

      userInput.value = '';
      setInputState(true);

      const userLine = appendLine('>', 'user-line');
      userLine.text.textContent = message;

      const userEntry = {
        role: 'user',
        parts: [{ text: message }]
      };
      conversationContents.push(userEntry);

      const agentLine = appendLine('$', 'agent-line');
      agentLine.text.textContent = '_';
      agentLine.text.classList.add('pending-text');

      try {
        const reply = await requestGeminiReply();

        conversationContents.push({
          role: 'model',
          parts: [{ text: reply }]
        });

        agentLine.text.classList.remove('pending-text');
        agentLine.text.textContent = '';
        await typewrite(agentLine.text, reply);
        agentLine.text.innerHTML = linkify(agentLine.text.textContent);
      } catch (error) {
        if (conversationContents[conversationContents.length - 1] === userEntry) {
          conversationContents.pop();
        }

        if (error?.code !== 'missing_api_key') {
          console.error('gemini request failed', error);
        }
        agentLine.text.classList.remove('pending-text');
        agentLine.text.textContent = error?.status
          ? getHttpErrorText(error.status)
          : getRequestErrorText(error);
      } finally {
        setInputState(false);
        userInput.focus();
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keydown', event => {
      if (event.key !== 'Enter' || event.isComposing) {
        return;
      }

      event.preventDefault();
      sendMessage();
    });

    openingSequence();
  </script>
</body>
</html>
